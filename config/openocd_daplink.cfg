# OpenOCD 配置文件 - CMSIS-DAP (DAPLink) + STM32G030F6P6
#
# 使用方法:
#   openocd -f config/openocd_daplink.cfg
#
# 烧录命令:
#   openocd -f config/openocd_daplink.cfg -c "program cmake-build-minsizerel-1/proj_mamba.elf verify reset exit"
#
# 调试连接:
#   openocd -f config/openocd_daplink.cfg
#   (另一终端) arm-none-eabi-gdb cmake-build-minsizerel-1/proj_mamba.elf
#   (gdb) target remote localhost:3333

# 调试器接口: CMSIS-DAP (DAPLink)
source [find interface/cmsis-dap.cfg]

# 传输协议: SWD (STM32G0 仅支持 SWD)
transport select swd

# 目标芯片: STM32G0x (Cortex-M0+)
source [find target/stm32g0x.cfg]

# SWD 时钟频率 (Hz)，默认 1MHz，可适当提高
adapter speed 4000

# 复位配置：使用 SYSRESETREQ (软件复位)
reset_config srst_nogate
